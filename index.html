<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imperio Life</title>
<link rel="stylesheet" href="estilo.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
</head>
<body>
<div id="loginScreen" class="login-screen">
<div class="login-box">
<h1>🔥 IMPERIO LIFE</h1>
<p>Construye tu imperio diario</p>
<input type="email" id="emailInput" placeholder="Tu correo" autocomplete="email">
<input type="password" id="passwordInput" placeholder="Contraseña" autocomplete="current-password">
<button onclick="entrar()">ENTRAR</button>
<p id="errorMsg" class="error"></p>
</div>
</div>

<div id="appScreen" class="app-screen oculto">
<div class="header">
<h2>Imperio Life</h2>
<p id="fecha"></p>
<button class="btn-salir" onclick="salir()">Salir</button>
</div>

<div class="stats">
<div class="stat-box">
<h3 id="porcentaje">0%</h3>
<p>Hoy</p>
</div>
<div class="stat-box">
<h3 id="racha">0</h3>
<p>Racha</p>
</div>
</div>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>

<div class="versiculo-box">
<h3>📖 Palabra del Día</h3>
<p id="versoTexto"></p>
<span id="versoCita"></span>
</div>

<div class="frase-box">
<h3>⚡ Mentalidad de Imperio</h3>
<div class="frase-contenido">
<p id="fraseTexto"></p>
<span id="fraseAutor"></span>
</div>
<label class="check-frase">
<input type="checkbox" id="checkFrase" onchange="marcarFrase()">
<span>Lo leí y lo creo</span>
</label>
</div>

<div class="section">
<h3>🎯 Hábitos Diarios</h3>
<div id="listaTareas"></div>
</div>

<div class="section">
<h3>💧 Agua</h3>
<p><span id="vasos">0</span>/8 vasos</p>
<button onclick="sumarAgua()">+1 Vaso</button>
<button class="btn-sec" onclick="resetAgua()">Reset</button>
</div>

<div class="section">
<h3>⚖️ Peso</h3>
<input type="number" id="inputPeso" placeholder="70.5" step="0.1">
<button onclick="guardarPeso()">Guardar</button>
<p>Último: <span id="ultimoPeso">--</span> kg</p>
</div>

<div class="section">
<h3>🎯 Metas 2026</h3>
<div id="listaMetas"></div>
<div class="add-meta">
<input type="text" id="inputMeta" placeholder="Nueva meta...">
<button onclick="agregarMeta()">Agregar</button>
</div>
</div>

<div class="section historial">
<h3>📅 Historial 30 Días</h3>
<div id="calendarioHistorial"></div>
</div>

<button class="btn-reset" onclick="resetDia()">Reset Día</button>
</div>

<script src="app.js"></script>
</body>
</html>
